<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ثبت‌نام موفق</title>
  <link rel="stylesheet" href="./assets/style.css" />
</head>
<body>
  <main class="success-page">
    <section class="success-card">
      <div class="success-icon">✓</div>
      <h1>ثبت‌نام با موفقیت انجام شد</h1>
      <p>کد رهگیری اختصاصی شما:</p>

      <div id="registrationCode" class="code">---</div>
      <canvas id="qrCanvas" width="220" height="220" aria-label="QR Code"></canvas>

      <p class="notice">
        این کد را تا زمان اعلام نتایج نزد خود نگه دارید. برای پیگیری، همین کد را ارائه کنید.
      </p>

      <a id="downloadLink" class="primary-link" href="#" target="_blank" rel="noopener">
        دریافت لینک دانلود اپلیکیشن
      </a>

      <a class="back-link" href="./index.html">ثبت فرم جدید</a>
    </section>
  </main>

  <script src="./assets/qr.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get("code") || localStorage.getItem("registrationCode") || "---";
    const link = params.get("download") || localStorage.getItem("downloadLink") || "#";

    document.getElementById("registrationCode").textContent = code;

    const download = document.getElementById("downloadLink");
    download.href = link;
    if (link === "#") {
      download.textContent = "لینک دانلود پس از تأیید فعال می‌شود";
      download.classList.add("disabled");
    }

    drawSimpleQR(document.getElementById("qrCanvas"), code);
  </script>
</body>
</html>
